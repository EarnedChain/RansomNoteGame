<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ransom Notes</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ransom Notes">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        #start-screen {
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            letter-spacing: 5px;
        }

        #entry-button {
            background-color: #ff4500;
            color: white;
            border: none;
            padding: 25px 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.6);
            transition: transform 0.2s ease;
        }

        #entry-button:active {
            transform: scale(0.95);
        }

        #app-content {
            display: none;
        }

        .ransom-label {
            background: white;
            color: black;
            padding: 15px 30px;
            font-size: 3rem;
            font-weight: 900;
            display: inline-block;
            transform: rotate(-3deg);
            box-shadow: 5px 5px 0px #ff4500;
        }

        /* Hides the YouTube video so only audio plays */
        #youtube-player-container {
            position: absolute;
            top: -9999px;
            left: -9999px;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>RANSOM NOTES</h1>
        <button id="entry-button">Start the Party</button>
    </div>

    <div id="app-content">
        <div class="ransom-label">FIREBALL ACTIVE</div>
        <p style="margin-top: 20px; opacity: 0.7;">Pitbull is looping in the background...</p>
    </div>

    <div id="youtube-player-container">
        <div id="player"></div>
    </div>

    <script>
        var player;
        var videoId = 'hHUbLv4ThOo'; // YouTube ID for Fireball

        // Load YouTube API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'loop': 1,
                    'playlist': videoId, // Required for the loop to work
                    'controls': 0,
                    'playsinline': 1,
                    'rel': 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            // Must start muted for mobile autoplay
            event.target.mute();
            event.target.playVideo();
        }

        function onPlayerStateChange(event) {
            // Manual loop fallback
            if (event.data === YT.PlayerState.ENDED) {
                player.playVideo();
            }
        }

        // Handle Button Click
        document.getElementById('entry-button').addEventListener('click', function() {
            if (player) {
                player.unMute();
                player.seekTo(0);
                player.playVideo();
            }
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        });
    </script>
</body>
</html>
